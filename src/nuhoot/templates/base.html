<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('brand', lang) }} — {{ t('dashboard', lang) }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --border: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --teal: #2dd4bf;
            --teal-dark: #14b8a6;
            --teal-glow: rgba(45, 212, 191, 0.15);
            --red: #f87171;
            --amber: #fbbf24;
            --green: #4ade80;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: {% if lang == 'ar' %}'Cairo'{% else %}'Inter'{% endif %}, sans-serif;
            min-height: 100vh;
            line-height: 1.6;
        }
        /* Navbar */
        nav.navbar {
            background: var(--surface);
            border-bottom: 2px solid var(--teal-dark);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .brand {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--teal);
            text-decoration: none;
            white-space: nowrap;
        }
        .nav-links { display: flex; gap: 0.25rem; flex: 1; }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.5rem 0.9rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .nav-links a:hover { background: var(--surface-hover); color: var(--text); }
        .nav-links a.active { background: var(--teal-glow); color: var(--teal); }
        /* Language toggle */
        .lang-toggle {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.2rem;
        }
        .lang-toggle a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.3rem 0.6rem;
            border-radius: 0.35rem;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .lang-toggle a.active { background: var(--teal-dark); color: var(--bg); }
        /* Main content */
        main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        h1 { font-size: 1.6rem; margin-bottom: 1.2rem; color: var(--text); }
        h2 { font-size: 1.2rem; margin: 1.5rem 0 0.75rem; color: var(--text); }
        /* Cards */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.25rem;
            border-top: 3px solid var(--teal-dark);
        }
        .stat-card .label { color: var(--text-muted); font-size: 0.85rem; font-weight: 600; }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--teal); margin-top: 0.3rem; }
        /* Tables */
        .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 0.75rem; overflow: hidden; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.7rem 1rem; text-align: start; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { color: var(--text-muted); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--surface-hover); }
        /* Badges */
        .badge { padding: 0.2rem 0.6rem; border-radius: 0.4rem; font-size: 0.75rem; font-weight: 600; display: inline-block; }
        .badge-found { background: rgba(148,163,184,0.2); color: var(--text-muted); }
        .badge-investigated { background: rgba(251,191,36,0.2); color: var(--amber); }
        .badge-pitched { background: rgba(45,212,191,0.2); color: var(--teal); }
        .badge-contacted { background: rgba(74,222,128,0.2); color: var(--green); }
        .badge-responded { background: rgba(74,222,128,0.3); color: var(--green); }
        .badge-converted { background: rgba(74,222,128,0.4); color: var(--green); }
        .badge-active { background: rgba(74,222,128,0.2); color: var(--green); }
        .badge-draft { background: rgba(148,163,184,0.2); color: var(--text-muted); }
        .badge-paused { background: rgba(251,191,36,0.2); color: var(--amber); }
        .badge-completed { background: rgba(45,212,191,0.2); color: var(--teal); }
        /* Buttons */
        .btn { padding: 0.4rem 0.8rem; border-radius: 0.4rem; border: none; font-size: 0.8rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.2s; }
        .btn-teal { background: var(--teal-dark); color: var(--bg); }
        .btn-teal:hover { background: var(--teal); }
        .btn-outline { background: transparent; color: var(--teal); border: 1px solid var(--teal-dark); }
        .btn-outline:hover { background: var(--teal-glow); }
        .btn-red { background: var(--red); color: var(--bg); }
        /* Filter bar */
        .filter-bar { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
        .filter-bar select, .filter-bar input {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.9rem;
            font-family: inherit;
        }
        /* Campaign cards */
        .campaign-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
        .campaign-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; border-top: 3px solid var(--teal-dark); }
        .campaign-card h3 { font-size: 1.05rem; margin-bottom: 0.5rem; }
        .campaign-stats { display: flex; gap: 1rem; margin-top: 0.75rem; font-size: 0.8rem; color: var(--text-muted); }
        .campaign-stats span strong { color: var(--text); }
        /* Form */
        .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; max-width: 480px; }
        .form-card label { display: block; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem; margin-top: 0.75rem; }
        .form-card input, .form-card select { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.9rem; font-family: inherit; }
        /* Progress bar */
        .progress-bar { background: var(--bg); border-radius: 0.5rem; height: 1.75rem; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--teal-dark), var(--teal)); border-radius: 0.5rem; display: flex; align-items: center; padding-inline-start: 0.75rem; font-size: 0.8rem; font-weight: 600; color: var(--bg); transition: width 0.5s; }
        /* CSS bar chart */
        .bar-chart { display: flex; flex-direction: column; gap: 0.5rem; }
        .bar-row { display: flex; align-items: center; gap: 0.75rem; }
        .bar-label { width: 120px; font-size: 0.85rem; color: var(--text-muted); text-align: end; flex-shrink: 0; }
        .bar-track { flex: 1; background: var(--bg); border-radius: 0.35rem; height: 1.5rem; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--teal-dark); border-radius: 0.35rem; }
        .bar-value { width: 40px; font-size: 0.8rem; color: var(--text); font-weight: 600; }
        /* Pagination */
        .pagination { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.25rem; align-items: center; }
        .pagination a, .pagination span { padding: 0.4rem 0.7rem; border-radius: 0.4rem; text-decoration: none; font-size: 0.85rem; }
        .pagination a { background: var(--surface); color: var(--teal); border: 1px solid var(--border); }
        .pagination a:hover { background: var(--surface-hover); }
        .pagination .current { background: var(--teal-dark); color: var(--bg); font-weight: 600; }
        .empty { color: var(--text-muted); text-align: center; padding: 2rem; font-style: italic; }
        .section { margin-bottom: 2rem; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } .nav-links { flex-wrap: wrap; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard?lang={{ lang }}" class="brand">{{ t('brand', lang) }}</a>
        <div class="nav-links">
            <a href="/dashboard?lang={{ lang }}" class="{% if active == 'dashboard' %}active{% endif %}">{{ t('dashboard', lang) }}</a>
            <a href="/businesses-page?lang={{ lang }}" class="{% if active == 'businesses' %}active{% endif %}">{{ t('businesses', lang) }}</a>
            <a href="/campaigns-page?lang={{ lang }}" class="{% if active == 'campaigns' %}active{% endif %}">{{ t('campaigns', lang) }}</a>
            <a href="/analytics?lang={{ lang }}" class="{% if active == 'analytics' %}active{% endif %}">{{ t('analytics', lang) }}</a>
        </div>
        <div class="lang-toggle">
            <a href="{{ request.url.path }}?lang=ar" class="{% if lang == 'ar' %}active{% endif %}">{{ t('language_toggle_ar', lang) }}</a>
            <a href="{{ request.url.path }}?lang=en" class="{% if lang == 'en' %}active{% endif %}">{{ t('language_toggle_en', lang) }}</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
